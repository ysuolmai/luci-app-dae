name: Build luci-app-dae .ipk

on:
  push:
    branches: [main]
    paths:
      - 'luci-app-dae/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
  release:
    types: [created]

# luci-app-dae 是架构无关包（LUCI_PKGARCH:=all），一次编译即可在所有 OpenWrt
# 设备上安装。dae 二进制本身需要匹配目标 kernel 的 BTF 信息，不在此 workflow
# 里编译——它由主固件 CI（ysuolmai/OpenWRT-CI）按 target 编进固件。
#
# 目标固件（VIKINGYFY/immortalwrt kernel 6.18）使用 opkg/ipk 包管理器，
# 故只产 .ipk。如需 .apk，把 SDK 换成 ImmortalWrt snapshot + CONFIG_USE_APK=y。
#
# LuCI 标准做法：base 包 + 翻译包分离。本 workflow 产物：
#   - luci-app-dae_<ver>_all.ipk          → 主包（JS/Lua/配置）
#   - luci-i18n-dae-zh-cn_<ver>_all.ipk   → 中文翻译

jobs:
  build:
    name: Build .ipk (ImmortalWrt 23.05.4 mediatek/filogic)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq build-essential libncurses-dev zlib1g-dev \
            gawk git gettext libssl-dev xsltproc rsync wget unzip python3

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-immortalwrt-23.05.4-mediatek-filogic-v1

      - name: Download SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          URL=https://downloads.immortalwrt.org/releases/23.05.4/targets/mediatek/filogic/immortalwrt-sdk-23.05.4-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          wget -q "$URL" -O sdk.tar.xz
          mkdir -p sdk
          tar -xf sdk.tar.xz -C sdk --strip-components=1
          rm sdk.tar.xz

      - name: Setup feeds
        working-directory: sdk
        run: |
          ./scripts/feeds update -a >/dev/null 2>&1
          ./scripts/feeds install -a >/dev/null 2>&1

      - name: Stage our luci-app-dae (override any feed copy)
        working-directory: sdk
        run: |
          rm -rf package/feeds/luci/luci-app-dae feeds/luci/applications/luci-app-dae
          cp -r ${{ github.workspace }}/luci-app-dae package/
          # +dae 是运行时依赖；本 SDK 里没有 dae 包，patch 掉避免 defconfig 卡住。
          # 实际固件里 dae 已由主 CI 编进去，不影响安装。
          sed -i 's/LUCI_DEPENDS:=+dae/LUCI_DEPENDS:=/' package/luci-app-dae/Makefile

      - name: Configure
        working-directory: sdk
        run: |
          cat > .config <<'EOF'
          CONFIG_PACKAGE_luci-app-dae=y
          CONFIG_PACKAGE_luci-i18n-dae-zh-cn=y
          EOF
          make defconfig

      - name: Build
        working-directory: sdk
        run: |
          make package/luci-app-dae/{clean,compile} V=s -j$(nproc) 2>&1 | tail -100

      - name: Collect artifacts (主包 + 翻译包)
        run: |
          mkdir -p artifacts
          find sdk/bin -type f \( -name 'luci-app-dae*.ipk' -o -name 'luci-i18n-dae*.ipk' \) -exec cp -v {} artifacts/ \;
          echo
          echo "=== artifacts ==="
          ls -lh artifacts/
          test -n "$(ls -A artifacts/)" || { echo "ERROR: no .ipk produced"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: luci-app-dae-ipk
          path: artifacts/*.ipk
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.ipk
