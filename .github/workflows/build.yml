name: Build luci-app-dae .ipk

on:
  push:
    branches: [main]
    paths:
      - 'luci-app-dae/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
  release:
    types: [created]

# luci-app-dae 是架构无关包（LUCI_PKGARCH:=all），一次编译即可在所有 OpenWrt
# 设备上安装。dae 二进制本身需要匹配目标 kernel 的 BTF 信息，不在此 workflow
# 里编译——它由主固件 CI（ysuolmai/OpenWRT-CI）按 target 编进固件。
#
# 目标固件（VIKINGYFY/immortalwrt kernel 6.18）使用 opkg/ipk 包管理器，
# 故只产 .ipk。如需 .apk，把 SDK 换成 ImmortalWrt snapshot + CONFIG_USE_APK=y。
#
# LuCI 标准做法：base 包 + 翻译包分离。本 workflow 产物：
#   - luci-app-dae_<ver>_all.ipk          → 主包（JS/Lua/配置）
#   - luci-i18n-dae-zh-cn_<ver>_all.ipk   → 中文翻译

jobs:
  build:
    name: Build .ipk (ImmortalWrt 23.05.4 mediatek/filogic)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq build-essential libncurses-dev zlib1g-dev \
            gawk git gettext libssl-dev xsltproc rsync wget unzip python3

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-immortalwrt-23.05.4-mediatek-filogic-v1

      - name: Download SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          URL=https://downloads.immortalwrt.org/releases/23.05.4/targets/mediatek/filogic/immortalwrt-sdk-23.05.4-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          wget -q "$URL" -O sdk.tar.xz
          mkdir -p sdk
          tar -xf sdk.tar.xz -C sdk --strip-components=1
          rm sdk.tar.xz

      - name: Setup feeds
        working-directory: sdk
        run: |
          ./scripts/feeds update -a >/dev/null 2>&1
          ./scripts/feeds install -a >/dev/null 2>&1

      - name: Stage our luci-app-dae (override any feed copy)
        working-directory: sdk
        run: |
          rm -rf package/feeds/luci/luci-app-dae feeds/luci/applications/luci-app-dae
          # 关键：必须先删掉缓存里残留的 package/luci-app-dae。否则 `cp -r src dest/`
          # 在 dest 已存在时会把源拷成子目录（package/luci-app-dae/luci-app-dae），
          # 顶层旧源码原封不动 → buildroot 永远编第一次那份旧的。
          rm -rf package/luci-app-dae
          cp -rT ${{ github.workspace }}/luci-app-dae package/luci-app-dae
          # +dae 是运行时依赖；本 SDK 里没有 dae 包，patch 掉避免 defconfig 卡住。
          # 实际固件里 dae 已由主 CI 编进去，不影响安装。
          sed -i 's/LUCI_DEPENDS:=+dae/LUCI_DEPENDS:=/' package/luci-app-dae/Makefile

      - name: Configure
        working-directory: sdk
        run: |
          cat > .config <<'EOF'
          CONFIG_PACKAGE_luci-app-dae=y
          CONFIG_PACKAGE_luci-i18n-dae-zh-cn=y
          EOF
          make defconfig

      - name: Purge stale build artifacts (cache-restored SDK 会带旧 build_dir/bin)
        working-directory: sdk
        run: |
          # PKG_VERSION 是写死的静态串，buildroot 仅凭版本号判断"已编译"，
          # 缓存恢复回来的 build_dir/.../luci-app-dae-*/.built stamp + bin 里的
          # 旧 .ipk 会被直接复用，导致新源码编不进去。强制清掉这些残留。
          # LuCI 包的 PKG_BUILD_DIR 是 build_dir/<target>/luci-app-dae（无版本后缀），
          # 里面有 .prepared_<hash> stamp + prepare 时拷进来的源码副本。缓存命中时
          # prepare 被跳过、复用旧副本。必须连这个无横杠目录一起删。
          rm -rf build_dir/*/luci-app-dae build_dir/*/luci-app-dae-* || true
          # 顺手清掉 staging 里的 install stamp 和 pkginfo，避免半缓存状态
          rm -rf staging_dir/*/root-*/stamp/.luci-app-dae* staging_dir/*/root-*/stamp/.luci-i18n-dae* || true
          rm -rf staging_dir/*/pkginfo/luci-app-dae* || true
          rm -rf bin || true
          echo "purged stale luci-app-dae build_dir + staging stamps + bin"
          ls build_dir/*/ 2>/dev/null | grep -i luci-app-dae && echo "WARN: 仍有残留" || echo "build_dir 已无 luci-app-dae 残留"

      - name: Build
        working-directory: sdk
        run: |
          make package/luci-app-dae/{clean,compile} V=s -j$(nproc) 2>&1 | tail -100

      - name: Collect artifacts (主包 + 翻译包)
        run: |
          mkdir -p artifacts
          find sdk/bin -type f \( -name 'luci-app-dae*.ipk' -o -name 'luci-i18n-dae*.ipk' \) -exec cp -v {} artifacts/ \;
          echo
          echo "=== artifacts ==="
          ls -lh artifacts/
          test -n "$(ls -A artifacts/)" || { echo "ERROR: no .ipk produced"; exit 1; }
          echo
          echo "=== freshness check: config.js md5 inside .ipk vs source ==="
          tmp=$(mktemp -d)
          tar xzf artifacts/luci-app-dae_*.ipk -C "$tmp"
          tar xzf "$tmp"/data.tar.gz -C "$tmp"
          IPK_MD5=$(md5sum "$tmp"/www/luci-static/resources/view/dae/config.js | cut -d' ' -f1)
          SRC_MD5=$(md5sum luci-app-dae/htdocs/luci-static/resources/view/dae/config.js | cut -d' ' -f1)
          echo "ipk    config.js md5: $IPK_MD5"
          echo "source config.js md5: $SRC_MD5"
          [ "$IPK_MD5" = "$SRC_MD5" ] && echo "OK: .ipk 用的是最新源码" || { echo "ERROR: .ipk config.js 与源码不一致（缓存污染）"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: luci-app-dae-ipk
          path: artifacts/*.ipk
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.ipk
